<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PosterReview</title>
<style>
  :root { --bg:#f7f6f3; --card:#fff; --ink:#1a1a1a; --muted:#6b6b6b; --line:#e6e3dd;
          --accent:#2f6f4f; --bad:#c0392b; --mid:#c9902a; --good:#2f8f5b; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16171a; --card:#1f2125; --ink:#ececec; --muted:#9aa0a6; --line:#2c2f34; }
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 40px 20px 80px; }
  h1 { font-size: 30px; margin: 0 0 4px; letter-spacing:-.02em; }
  .sub { color: var(--muted); margin: 0 0 28px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:22px; margin:16px 0; }
  form.upload { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  input[type=file] { flex:1; min-width:220px; }
  label.chk { color:var(--muted); font-size:14px; display:flex; gap:6px; align-items:center; }
  button { background:var(--accent); color:#fff; border:0; border-radius:10px;
           padding:11px 20px; font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .hidden { display:none; }
  .spin { width:18px;height:18px;border:3px solid var(--line);border-top-color:var(--accent);
          border-radius:50%;display:inline-block;animation:s 1s linear infinite;vertical-align:-4px;}
  @keyframes s { to { transform:rotate(360deg);} }
  .scorehead { display:flex; gap:26px; flex-wrap:wrap; align-items:center; }
  .big { font-size:46px; font-weight:700; letter-spacing:-.02em; line-height:1; }
  .big small { font-size:18px; color:var(--muted); font-weight:500; }
  .bars { flex:1; min-width:260px; }
  .bar { display:flex; align-items:center; gap:10px; margin:5px 0; font-size:13px; }
  .bar .name { width:120px; color:var(--muted); text-transform:capitalize; }
  .track { flex:1; height:8px; background:var(--line); border-radius:5px; overflow:hidden; }
  .fill { height:100%; border-radius:5px; }
  .note { color:var(--muted); font-size:12px; }
  h2 { font-size:15px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted);
       margin: 26px 0 8px; }
  .dim { border-top:1px solid var(--line); padding:14px 0; }
  .dim:first-child { border-top:0; }
  .dimhead { display:flex; align-items:baseline; gap:10px; }
  .pill { font-weight:700; font-size:13px; padding:2px 9px; border-radius:20px; color:#fff; }
  .dimname { font-weight:600; text-transform:capitalize; }
  .cat { color:var(--muted); font-size:12px; }
  .rat { margin:6px 0 4px; }
  .sug { color:var(--muted); font-size:14px; margin:2px 0 0 16px; }
  ul.plain { margin:6px 0; padding-left:20px; }
  ul.plain li { margin:3px 0; }
  a { color:var(--accent); }
  .err { color:var(--bad); }
</style>
</head>
<body>
<div class="wrap">
  <h1>PosterReview</h1>
  <p class="sub">Upload a research poster (PDF). Get a grounded design score and an
     evidence-based review — runs on local compute, no API cost.
     <span class="note">· engine: {{ engine }}</span></p>

  <div class="card">
    <form class="upload" id="form">
      <input type="file" name="poster" accept="application/pdf" required>
      <label class="chk"><input type="checkbox" name="arxiv" checked> ground in arXiv</label>
      <button type="submit" id="go">Review</button>
    </form>
    <p class="note" id="hint" style="margin:12px 0 0">
      The review runs a local model and takes ~2–3 minutes.</p>
  </div>

  <div class="card hidden" id="working">
    <span class="spin"></span> <span id="stage">Analyzing poster…</span>
    <div class="note" id="elapsed" style="margin-top:6px"></div>
  </div>

  <div id="out"></div>
</div>

<script>
const form = document.getElementById('form');
const go = document.getElementById('go');
const working = document.getElementById('working');
const stageEl = document.getElementById('stage');
const elapsedEl = document.getElementById('elapsed');
const out = document.getElementById('out');
let t0, timer;

const scoreColor = (v, max) => { const p=v/max; return p<.5?'var(--bad)':p<.75?'var(--mid)':'var(--good)'; };

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  out.innerHTML=''; go.disabled=true; working.classList.remove('hidden');
  t0=Date.now(); tick();
  timer=setInterval(tick, 1000);
  const fd = new FormData(form);
  let res;
  try { res = await (await fetch('/review',{method:'POST',body:fd})).json(); }
  catch { return fail('Upload failed.'); }
  if (res.error) return fail(res.error);
  poll(res.job_id);
});

function tick(){ elapsedEl.textContent = ((Date.now()-t0)/1000|0)+'s elapsed';
  stageEl.textContent = (Date.now()-t0)<8000?'Analyzing poster & measuring design…'
    : (Date.now()-t0)<20000?'Retrieving related work…':'Writing the review…'; }

function fail(msg){ clearInterval(timer); working.classList.add('hidden'); go.disabled=false;
  out.innerHTML='<div class="card err">'+msg+'</div>'; }

async function poll(id){
  try {
    const s = await (await fetch('/status/'+id)).json();
    if (s.status==='running') return setTimeout(()=>poll(id), 3000);
    clearInterval(timer); working.classList.add('hidden'); go.disabled=false;
    if (s.status==='error') return fail('Review failed: '+(s.error||'unknown'));
    render(s.result);
  } catch { setTimeout(()=>poll(id), 3000); }
}

function render(d){
  const ds=d.design_score, r=d.review;
  let h='';
  // design score
  h+='<div class="card"><div class="scorehead">';
  h+='<div><div class="big" style="color:'+scoreColor(ds.overall,100)+'">'+ds.overall+'<small>/100</small></div>'
    +'<div class="note">design score</div></div>';
  h+='<div class="bars">';
  for(const k in ds.subscores){ const v=ds.subscores[k];
    h+='<div class="bar"><span class="name">'+k.replace(/_/g,' ')+'</span>'
      +'<span class="track"><span class="fill" style="width:'+v+'%;background:'+scoreColor(v,100)+'"></span></span>'
      +'<span>'+v.toFixed(0)+'</span></div>'; }
  h+='</div></div>';
  h+='<p class="note" style="margin:12px 0 0">Design is measured deterministically from the '
    +'poster (font sizes, contrast, layout) — not guessed.</p></div>';

  if(r){
    if(r.one_line_summary) h+='<div class="card"><strong>'+esc(r.one_line_summary)+'</strong></div>';
    // content dimensions
    h+='<div class="card"><h2 style="margin-top:0">Content review · '
      +'<span style="color:'+scoreColor(d.provisional_score,5)+'">'+d.provisional_score+'/5</span></h2>';
    for(const dim of r.dimensions){
      h+='<div class="dim"><div class="dimhead">'
        +'<span class="pill" style="background:'+scoreColor(dim.score,5)+'">'+dim.score+'/5</span>'
        +'<span class="dimname">'+dim.name.replace(/_/g,' ')+'</span>'
        +'<span class="cat">'+dim.category+'</span></div>';
      if(dim.rationale) h+='<div class="rat">'+esc(dim.rationale)+'</div>';
      for(const s of (dim.suggestions||[])) h+='<div class="sug">→ '+esc(s)+'</div>';
      h+='</div>';
    }
    h+='</div>';
    // strengths / weaknesses / notes
    h+=list('Strengths', r.top_strengths, '＋');
    h+=list('Weaknesses', r.top_weaknesses, '－');
    h+=list('Grounded design notes', r.grounded_design_notes, '·');
  }
  // related work
  if(d.related_work && d.related_work.length){
    h+='<div class="card"><h2 style="margin-top:0">Related work ('+d.related_work.length+')</h2><ul class="plain">';
    for(const p of d.related_work) h+='<li><a href="'+p.url+'" target="_blank">'+esc(p.title)+'</a> '
      +'<span class="note">'+(p.year||'')+'</span></li>';
    h+='</ul></div>';
  }
  out.innerHTML=h;
}

function list(title, items, mark){
  if(!items || !items.length) return '';
  let h='<div class="card"><h2 style="margin-top:0">'+title+'</h2><ul class="plain">';
  for(const i of items) h+='<li>'+mark+' '+esc(i)+'</li>';
  return h+'</ul></div>';
}
function esc(s){ return (s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
</script>
</body>
</html>
